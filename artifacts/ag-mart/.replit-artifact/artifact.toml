kind = "web"
previewPath = "/"
title = "Agrillion Mart"
version = "1.0.0"
id = "artifacts/ag-mart"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21565

[services.development]
run = "pnpm --filter @workspace/ag-mart run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ag-mart", "run", "build" ]
publicDir = "artifacts/ag-mart/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21565"
BASE_PATH = "/"
